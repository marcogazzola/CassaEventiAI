name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore src/CassaEventiAI.csproj

      - name: Publish (self-contained single file)
        shell: pwsh
        run: |
          dotnet publish src/CassaEventiAI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -p:FileVersion=${{ steps.version.outputs.VERSION }}.0 `
            -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0 `
            -o publish

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe" `
            /DAppVersion=${{ steps.version.outputs.VERSION }} `
            installer\setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: installer/Output/CassaEventiAI_Setup_${{ steps.version.outputs.VERSION }}.exe
          generate_release_notes: true
          draft: false
          prerelease: false
