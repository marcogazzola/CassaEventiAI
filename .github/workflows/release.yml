name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/CassaEventiAI.csproj \
            -c Release \
            -r win-x64 \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:FileVersion=${{ steps.version.outputs.VERSION }}.0 \
            -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0 \
            -o publish

      - name: Build installer
        shell: bash
        run: |
          iscc \
            "/DAppVersion=${{ steps.version.outputs.VERSION }}" \
            installer/setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: installer/Output/CassaEventiAI_Setup_${{ steps.version.outputs.VERSION }}.exe
          generate_release_notes: true
